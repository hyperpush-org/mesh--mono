<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesh Actor Model</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0a;
    color: #f5f5f5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: calc(100vh - 200px);
    min-height: 500px;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ─── Overlays ─── */
  .overlay {
    position: absolute;
    z-index: 20;
    pointer-events: none;
  }

  /* Logo — top left */
  .logo-area {
    top: 28px; left: 36px;
    display: flex; align-items: center; gap: 0;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .logo-area.visible { opacity: 1; }
  .logo-area svg.hp-logo { height: 20px; width: auto; }
  .logo-area .slash {
    font-size: 18px; font-weight: 300;
    color: rgba(255,255,255,0.15);
    margin: 0 10px;
  }
  .logo-area svg.mesh-icon { width: 20px; height: 20px; margin-right: 7px; }
  .logo-area .mesh-name { font-size: 14px; font-weight: 800; letter-spacing: -0.3px; }
  .logo-area .tag {
    font-size: 10px; font-weight: 600;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1.8px; text-transform: uppercase;
    margin-left: 10px; padding-left: 10px;
    border-left: 1px solid rgba(255,255,255,0.08);
  }

  /* Status pill — top right */
  .status-pill {
    top: 26px; right: 36px;
    display: flex; align-items: center; gap: 7px;
    padding: 7px 16px; border-radius: 100px;
    border: 1px solid rgba(89,193,132,0.2);
    background: rgba(89,193,132,0.05);
    font: 600 10px/1 'JetBrains Mono', monospace;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: #59C184;
    opacity: 0;
    transition: opacity 0.5s ease, border-color 0.5s ease, color 0.5s ease, background 0.5s ease;
  }
  .status-pill.visible { opacity: 1; }
  .status-pill .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: #59C184;
    box-shadow: 0 0 6px rgba(89,193,132,0.6);
    transition: background 0.4s, box-shadow 0.4s;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 4px rgba(89,193,132,0.4); }
    50% { box-shadow: 0 0 10px rgba(89,193,132,0.8); }
  }
  .status-pill.crash {
    border-color: rgba(255,70,70,0.35);
    background: rgba(255,70,70,0.07);
    color: #ff5050;
  }
  .status-pill.crash .dot {
    background: #ff5050;
    box-shadow: 0 0 8px rgba(255,70,70,0.7);
    animation: pulse-dot-red 0.6s ease-in-out infinite;
  }
  @keyframes pulse-dot-red {
    0%, 100% { box-shadow: 0 0 4px rgba(255,70,70,0.4); }
    50% { box-shadow: 0 0 14px rgba(255,70,70,1); }
  }

  /* Process counter */
  .process-counter {
    top: 56px; right: 42px;
    font: 500 10px/1 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.18);
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .process-counter.visible { opacity: 1; }
  .process-counter span { color: rgba(255,255,255,0.45); font-weight: 600; }

  /* Phase title — bottom left */
  .phase-title {
    bottom: 28px; left: 44px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s cubic-bezier(.4,0,.2,1), transform 0.5s cubic-bezier(.4,0,.2,1);
  }
  .phase-title.visible { opacity: 1; transform: translateY(0); }
  .phase-title .label {
    font: 600 10px/1 'JetBrains Mono', monospace;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: #59C184; margin-bottom: 10px;
    opacity: 0.7;
  }
  .phase-title .heading {
    font-size: 26px; font-weight: 800;
    letter-spacing: -1px; line-height: 1.15;
    color: #f5f5f5;
  }
  .phase-title .heading .accent { color: #59C184; }
  .phase-title .sub {
    font-size: 13px; color: rgba(255,255,255,0.3);
    margin-top: 6px; max-width: 360px; line-height: 1.5;
  }

  /* Code snippet — bottom right */
  .code-snippet {
    bottom: 28px; right: 44px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s cubic-bezier(.4,0,.2,1), transform 0.5s cubic-bezier(.4,0,.2,1);
    font: 400 11px/1.7 'JetBrains Mono', monospace;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 16px 20px;
    white-space: pre;
    backdrop-filter: blur(16px);
    max-width: 380px;
  }
  .code-snippet.visible { opacity: 1; transform: translateY(0); }
  .code-snippet .kw  { color: #59C184; }
  .code-snippet .fn  { color: #e8e8e8; }
  .code-snippet .str { color: rgba(255,255,255,0.45); }
  .code-snippet .cm  { color: rgba(255,255,255,0.18); }
  .code-snippet .op  { color: rgba(255,255,255,0.35); }
  .code-snippet .num { color: #c4a7e7; }
  .code-snippet .err { color: #ff5050; }
  .code-snippet .ok  { color: #59C184; }
  .code-snippet .type { color: #c4a7e7; }
</style>
</head>

<script>
// ═══════════════════════════════════════════
// Canvas setup — fill viewport, respect DPR
// ═══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const sceneEl = document.getElementById('scene');
let W, H, DPR, CX, CY;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const rect = sceneEl.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  CX = W * 0.5;
  CY = H * 0.35;
  layoutActors();
}

// ═══════════════════════════════════════════
// Color helpers
// ═══════════════════════════════════════════
const ACCENT = [89, 193, 132];
const RED    = [255, 70, 70];
const ORANGE = [255, 165, 50];
const BLUE   = [100, 155, 255];
const PURPLE = [175, 130, 255];
const WHITE  = [255, 255, 255];
const YELLOW = [255, 220, 80];

function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }
function lerpColor(a, b, t) {
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
}

// ═══════════════════════════════════════════
// Easing
// ═══════════════════════════════════════════
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}
function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI / 3)) + 1;
}
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;
}

// ═══════════════════════════════════════════
// Actor definitions — positions set in layoutActors()
//
// Supervision tree (fault-tolerance hierarchy):
//   Supervisor -> HTTP, Auth, Router, DB Pool (one_for_one)
//   HTTP -> WS:1, WS:2  (supervises its children)
//   Auth -> Session
//   Router -> Logger
//   DB Pool -> Cache, Query
//
// Message paths are separate — any actor can send
// to any actor it has a PID for.
// ═══════════════════════════════════════════
const actorDefs = [
  { id: 'supervisor', label: 'Supervisor', tier: 0, color: ACCENT, r: 0.032, ox: 0, oy: -0.22 },
  { id: 'http',     label: 'HTTP',      tier: 1, color: ACCENT, r: 0.025, ox: -0.24, oy: 0.02 },
  { id: 'auth',     label: 'Auth',      tier: 1, color: BLUE,   r: 0.025, ox: -0.08, oy: 0.05 },
  { id: 'router',   label: 'Router',    tier: 1, color: PURPLE, r: 0.025, ox: 0.08,  oy: 0.05 },
  { id: 'dbpool',   label: 'DB Pool',   tier: 1, color: ORANGE, r: 0.025, ox: 0.24,  oy: 0.02 },
  { id: 'ws1',      label: 'WS:1',      tier: 2, color: ACCENT, r: 0.017, ox: -0.30, oy: 0.24 },
  { id: 'ws2',      label: 'WS:2',      tier: 2, color: ACCENT, r: 0.017, ox: -0.18, oy: 0.26 },
  { id: 'session',  label: 'Session',   tier: 2, color: BLUE,   r: 0.017, ox: -0.04, oy: 0.27 },
  { id: 'logger',   label: 'Logger',    tier: 2, color: PURPLE, r: 0.017, ox: 0.08,  oy: 0.28 },
  { id: 'cache',    label: 'Cache',     tier: 2, color: ORANGE, r: 0.017, ox: 0.19,  oy: 0.26 },
  { id: 'query',    label: 'Query',     tier: 2, color: ORANGE, r: 0.017, ox: 0.30,  oy: 0.24 },
];

// Supervision links — NOT message paths.
// These represent who monitors/restarts whom.
const supervisionLinks = [
  [0,1],[0,2],[0,3],[0,4], // supervisor -> tier1
  [1,5],[1,6],             // http -> ws children
  [2,7],                    // auth -> session
  [3,8],                    // router -> logger
  [4,9],[4,10],            // dbpool -> cache, query
];

// Realistic message routes — business logic flows.
// HTTP receives requests, sends to Router for dispatch,
// Router asks Auth for verification, Auth checks Session,
// Router sends to DB Pool for data, DB Pool uses Query/Cache.
const msgRoutes = [
  // HTTP request flow
  { from: 1, to: 3, label: 'route_request' },   // HTTP -> Router
  { from: 3, to: 2, label: 'verify_token' },     // Router -> Auth
  { from: 2, to: 7, label: 'check_session' },    // Auth -> Session
  { from: 3, to: 4, label: 'query_data' },       // Router -> DB Pool
  { from: 4, to: 10, label: 'execute_query' },   // DB Pool -> Query
  { from: 4, to: 9, label: 'cache_lookup' },     // DB Pool -> Cache
  // WebSocket flows
  { from: 5, to: 3, label: 'ws_message' },       // WS:1 -> Router
  { from: 6, to: 3, label: 'ws_message' },       // WS:2 -> Router
  // Response back-propagation
  { from: 3, to: 1, label: 'response' },         // Router -> HTTP
  { from: 9, to: 4, label: 'cache_hit' },        // Cache -> DB Pool
  // Logging (any actor can log)
  { from: 1, to: 8, label: 'log_event' },        // HTTP -> Logger
  { from: 3, to: 8, label: 'log_event' },        // Router -> Logger
];

// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
let actors = [];
let edges = [];
let messages = [];
let particles = [];    // ambient
let explosions = [];
let shockwaves = [];
let ringPulses = [];   // expanding ring effect on spawn
let time = 0;
let phase = -1;
let phaseTime = 0;
let screenShake = { x: 0, y: 0, intensity: 0 };
let downSignalSent = false; // track :DOWN signal in crash phase

function layoutActors() {
  const scale = Math.min(W, H);
  actors.forEach((a, i) => {
    const def = actorDefs[i];
    a.baseX = CX + def.ox * scale;
    a.baseY = CY + def.oy * scale;
    a.baseRadius = def.r * scale;
  });
}

function initActors() {
  actors = actorDefs.map(def => ({
    ...def, x: 0, y: 0, baseX: 0, baseY: 0,
    baseRadius: 0, radius: 0,
    alive: false, opacity: 0, scale: 0, targetScale: 0,
    spawnT: 0, // 0..1 spawn animation progress
    pulsePhase: Math.random() * Math.PI * 2,
    floatSeedX: Math.random() * 100,
    floatSeedY: Math.random() * 100,
    crash: false, crashShake: 0,
    respawnGlow: 0,
    mailboxFlash: 0,
    mailboxCount: 0, // number of queued messages
    mailboxDecay: 0, // visual decay timer
    ringPhase: 0, // rotating ring
    processing: false, // currently processing a message
    processTimer: 0,
  }));
  edges = supervisionLinks.map(([f, t]) => ({ from: f, to: t, opacity: 0 }));
  messages = [];
  particles = [];
  explosions = [];
  shockwaves = [];
  ringPulses = [];
  downSignalSent = false;
  layoutActors();
  initAmbientParticles();
}

// ═══════════════════════════════════════════
// Ambient particles — drifting dots
// ═══════════════════════════════════════════
function initAmbientParticles() {
  particles = [];
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.1,
      radius: 0.5 + Math.random() * 1.5,
      alpha: 0.03 + Math.random() * 0.06,
      green: Math.random() < 0.3,
    });
  }
}

// ═══════════════════════════════════════════
// Messages — travel along bezier curves
// These represent actual actor messages (send/receive),
// NOT supervision links.
// ═══════════════════════════════════════════
function sendMsg(fromIdx, toIdx, color, speed, isSignal) {
  const a = actors[fromIdx], b = actors[toIdx];
  if (!a || !b) return;
  // For signals (:DOWN, restart), allow even if target is dead
  if (!isSignal && (!a.alive || !b.alive)) return;
  const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
  const dx = b.x - a.x, dy = b.y - a.y;
  const perpX = -dy * 0.2 * (Math.random() - 0.3);
  const perpY =  dx * 0.2 * (Math.random() - 0.3);
  messages.push({
    fromIdx, toIdx,
    ax: a.x, ay: a.y,
    cpx: mx + perpX, cpy: my + perpY,
    bx: b.x, by: b.y,
    progress: 0,
    speed: speed || 0.012 + Math.random() * 0.006,
    color: color || ACCENT,
    isSignal: !!isSignal,
  });
}

// Send a message along a realistic business route
function sendBusinessMsg() {
  const route = msgRoutes[Math.floor(Math.random() * msgRoutes.length)];
  if (actors[route.from].alive && actors[route.to].alive) {
    sendMsg(route.from, route.to, actors[route.from].color, 0.01 + Math.random() * 0.008);
  }
}

// ═══════════════════════════════════════════
// Explosions
// ═══════════════════════════════════════════
function explode(x, y, color, count) {
  for (let i = 0; i < (count || 50); i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 5;
    explosions.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.008 + Math.random() * 0.015,
      radius: 1 + Math.random() * 3.5,
      color: color || RED,
    });
  }
  shockwaves.push({ x, y, radius: 0, maxRadius: Math.min(W,H) * 0.2, opacity: 0.6, color });
  screenShake.intensity = 12;
}

// ═══════════════════════════════════════════
// Ring pulse — expanding ring on actor spawn
// ═══════════════════════════════════════════
function spawnRing(x, y, color) {
  ringPulses.push({ x, y, radius: 0, maxRadius: 60, opacity: 0.5, color: color || ACCENT });
}

// ═══════════════════════════════════════════
// Phases — corrected for actor model accuracy
//
// Key corrections vs. original:
// 1. Supervision tree is a MONITORING hierarchy, not a message path
// 2. Messages flow between ANY actors (business logic), not along tree edges
// 3. one_for_one: only the crashed child restarts, siblings unaffected
// 4. Supervisor receives :DOWN signal, then restarts the specific child
// 5. Mailbox visualization shows message queuing
// ═══════════════════════════════════════════
const phases = [
  // Phase 0 — Spawn actors: supervisor starts children in order
  {
    duration: 5,
    label: '01', heading: 'Lightweight <span class="accent">Processes</span>',
    sub: 'Each actor is an isolated process with its own heap, stack, and mailbox. Supervisors start and monitor their children.',
    code: `<span class="cm"># each actor: own heap, own mailbox</span>
<span class="kw">let</span> <span class="fn">sup</span>  <span class="op">=</span> <span class="kw">spawn</span><span class="op">(</span>AppSupervisor<span class="op">)</span>

<span class="cm"># supervisor spawns child actors</span>
<span class="kw">let</span> <span class="fn">http</span> <span class="op">=</span> <span class="kw">spawn</span><span class="op">(</span>http_handler<span class="op">)</span>
<span class="kw">let</span> <span class="fn">auth</span> <span class="op">=</span> <span class="kw">spawn</span><span class="op">(</span>auth_service<span class="op">)</span>
<span class="kw">let</span> <span class="fn">rtr</span>  <span class="op">=</span> <span class="kw">spawn</span><span class="op">(</span>router<span class="op">)</span>
<span class="kw">let</span> <span class="fn">pool</span> <span class="op">=</span> <span class="kw">spawn</span><span class="op">(</span>db_pool<span class="op">)</span>`,
    enter(t) {
      // Supervisor spawns first, then it spawns its children in order
      const spawnOrder = [
        { idx: 0, delay: 0.3 },  // Supervisor itself
        { idx: 1, delay: 0.9 },  // HTTP (child of supervisor)
        { idx: 2, delay: 1.3 },  // Auth
        { idx: 3, delay: 1.7 },  // Router
        { idx: 4, delay: 2.1 },  // DB Pool
        { idx: 5, delay: 2.5 },  // WS:1 (child of HTTP)
        { idx: 6, delay: 2.7 },  // WS:2
        { idx: 7, delay: 2.9 },  // Session (child of Auth)
        { idx: 8, delay: 3.1 },  // Logger (child of Router)
        { idx: 9, delay: 3.3 },  // Cache (child of DB Pool)
        { idx: 10, delay: 3.5 }, // Query
      ];
      spawnOrder.forEach(({ idx, delay }) => {
        const a = actors[idx];
        if (t >= delay && !a.alive) {
          a.alive = true;
          a.targetScale = 1;
          a.spawnT = 0;
          spawnRing(a.baseX, a.baseY, a.color);
        }
        if (a.alive && a.spawnT < 1) {
          a.spawnT = Math.min(1, a.spawnT + 0.025);
        }
      });
      // Supervision links fade in as both ends are alive
      edges.forEach(e => {
        if (actors[e.from].alive && actors[e.to].alive)
          e.opacity = Math.min(1, e.opacity + 0.025);
      });
    },
  },

  // Phase 1 — Message passing along business routes (not tree edges!)
  {
    duration: 7,
    label: '02', heading: 'Message <span class="accent">Passing</span>',
    sub: 'No shared memory. Actors communicate by sending async messages to each other\'s mailbox. Any actor can message any other.',
    code: `<span class="cm"># actors loop on their mailbox</span>
<span class="kw">actor</span> <span class="fn">router</span><span class="op">()</span> <span class="kw">do</span>
  <span class="kw">receive</span> <span class="kw">do</span>
    msg <span class="op">-></span>
      <span class="kw">send</span><span class="op">(</span>auth<span class="op">,</span> msg<span class="op">.</span>token<span class="op">)</span>
      <span class="kw">send</span><span class="op">(</span>pool<span class="op">,</span> msg<span class="op">.</span>path<span class="op">)</span>
      <span class="kw">send</span><span class="op">(</span>msg<span class="op">.</span>from<span class="op">,</span> result<span class="op">)</span>
  <span class="kw">end</span>
<span class="kw">end</span>`,
    enter(t) {
      // Business messages — flows between actors that logically communicate
      if (Math.random() < 0.09) {
        sendBusinessMsg();
      }
      // Occasionally show cross-cutting concerns (logging)
      if (Math.random() < 0.025) {
        const loggers = [1, 2, 3, 4]; // tier1 actors sending to logger
        const sender = loggers[Math.floor(Math.random() * loggers.length)];
        if (actors[sender].alive && actors[8].alive) {
          sendMsg(sender, 8, PURPLE, 0.008);
        }
      }
    },
  },

  // Phase 2 — Crash & isolation
  // Only Router crashes. one_for_one means ONLY Router is affected.
  // Supervisor receives :DOWN signal. Other actors keep running.
  {
    duration: 6,
    label: '03', heading: 'Fault <span class="accent">Isolation</span>',
    sub: 'A process crash is isolated. The supervisor receives a :DOWN signal. All other processes continue unaffected.',
    code: `<span class="cm"># Router crashes on bad input</span>
<span class="kw">receive</span> <span class="kw">do</span>
  msg <span class="op">-></span> <span class="kw">case</span> msg <span class="kw">do</span>
    <span class="type">None</span> <span class="op">-></span> <span class="err">panic("bad input")</span>
  <span class="kw">end</span>
<span class="kw">end</span>

<span class="cm"># supervisor detects crash</span>
<span class="cm"># isolated — others unaffected</span>
<span class="fn">HTTP</span>    <span class="op">→</span> <span class="ok">running ✓</span>
<span class="fn">Auth</span>    <span class="op">→</span> <span class="ok">running ✓</span>
<span class="fn">DB Pool</span> <span class="op">→</span> <span class="ok">running ✓</span>`,
    enter(t) {
      const ri = 3; // router index
      const si = 0; // supervisor index

      // Pre-crash: router shakes, turns red
      if (t >= 0.6 && t < 1.5 && !actors[ri].crash) {
        actors[ri].crashShake = Math.min(6, actors[ri].crashShake + 0.3);
        actors[ri].color = lerpColor(PURPLE, RED, Math.min(1, (t - 0.6) / 0.8));
      }

      // Router crashes — only Router, not its children (Logger stays alive
      // because in a real system Logger would be under its own supervisor
      // or crash independently via linked process semantics)
      if (t >= 1.5 && actors[ri].alive && actors[ri].crash === false) {
        actors[ri].crash = true;
        explode(actors[ri].x, actors[ri].y, RED, 60);
        actors[ri].alive = false;
        actors[ri].targetScale = 0;
        document.getElementById('statusPill').classList.add('crash');
        document.getElementById('statusText').textContent = 'Process Crashed';
        downSignalSent = false;
      }

      // :DOWN signal travels from crashed process location UP to supervisor
      // This is the monitor notification — the supervisor is monitoring its children
      if (t >= 2.0 && !downSignalSent && !actors[ri].alive) {
        // Signal from crash site to supervisor (red/yellow signal particle)
        sendMsg(ri, si, YELLOW, 0.02, true);
        downSignalSent = true;
      }

      // Other actors keep sending messages — they're totally unaffected
      if (t > 2.0 && Math.random() < 0.06) {
        // Only routes that don't involve the crashed Router
        const aliveRoutes = msgRoutes.filter(r =>
          r.from !== ri && r.to !== ri &&
          actors[r.from].alive && actors[r.to].alive
        );
        if (aliveRoutes.length) {
          const route = aliveRoutes[Math.floor(Math.random() * aliveRoutes.length)];
          sendMsg(route.from, route.to, actors[route.from].color);
        }
      }

      // Fade supervision links where one end is dead
      edges.forEach(e => {
        if (!actors[e.from].alive || !actors[e.to].alive)
          e.opacity = Math.max(0, e.opacity - 0.04);
      });
    },
  },

  // Phase 3 — Supervisor restart (one_for_one)
  // Supervisor received :DOWN, now it restarts ONLY the Router.
  // This is the correct one_for_one behavior.
  {
    duration: 6,
    label: '04', heading: 'Supervisor <span class="accent">Restart</span>',
    sub: 'one_for_one: the supervisor restarts only the failed process. Fresh state, same PID slot. System self-heals.',
    code: `<span class="cm"># one_for_one strategy</span>
<span class="kw">supervisor</span> AppSup <span class="kw">do</span>
  strategy<span class="op">:</span> one_for_one
  max_restarts<span class="op">:</span> <span class="num">3</span>
  max_seconds<span class="op">:</span> <span class="num">5</span>

  child http <span class="kw">do</span>
    start<span class="op">:</span> <span class="kw">fn</span> <span class="op">-></span> <span class="kw">spawn</span><span class="op">(</span>http_handler<span class="op">)</span> <span class="kw">end</span>
    restart<span class="op">:</span> permanent
  <span class="kw">end</span>
  child router <span class="kw">do</span>
    start<span class="op">:</span> <span class="kw">fn</span> <span class="op">-></span> <span class="kw">spawn</span><span class="op">(</span>router<span class="op">)</span> <span class="kw">end</span>
    restart<span class="op">:</span> permanent
  <span class="kw">end</span>
<span class="kw">end</span>
<span class="cm"># </span><span class="ok">✓ Router restarted, fresh state</span>`,
    enter(t) {
      const ri = 3, si = 0;

      // Supervisor "decides" to restart — brief glow on supervisor
      if (t >= 0.3 && t < 0.6) {
        actors[si].mailboxFlash = Math.max(actors[si].mailboxFlash, 0.8);
      }

      // Respawn ONLY the Router (one_for_one — siblings untouched)
      if (t >= 1.2 && !actors[ri].alive) {
        actors[ri].alive = true;
        actors[ri].crash = false;
        actors[ri].crashShake = 0;
        actors[ri].targetScale = 1;
        actors[ri].spawnT = 0;
        actors[ri].respawnGlow = 1;
        actors[ri].color = PURPLE;
        actors[ri].mailboxCount = 0;
        spawnRing(actors[ri].baseX, actors[ri].baseY, ACCENT);
      }
      if (actors[ri].alive && actors[ri].spawnT < 1)
        actors[ri].spawnT = Math.min(1, actors[ri].spawnT + 0.025);

      if (t >= 2.0) {
        document.getElementById('statusPill').classList.remove('crash');
        document.getElementById('statusText').textContent = 'System Restored';
      }

      // Supervision links restore
      edges.forEach(e => {
        if (actors[e.from].alive && actors[e.to].alive)
          e.opacity = Math.min(1, e.opacity + 0.03);
      });

      // Resume normal messaging through Router
      if (t > 2.5 && Math.random() < 0.07) {
        sendBusinessMsg();
      }
    },
  },

  // Phase 4 — Full system, heavy traffic, show the beauty of the model
  {
    duration: 6,
    label: '05', heading: 'Self-Healing <span class="accent">Systems</span>',
    sub: 'Millions of isolated processes. Async message passing. Supervision trees for automatic fault recovery.',
    code: `<span class="cm"># the actor model</span>
<span class="ok">✓</span> <span class="str">Isolated actor memory</span>
<span class="ok">✓</span> <span class="str">Async mailbox messaging</span>
<span class="ok">✓</span> <span class="str">Supervision trees</span>
<span class="ok">✓</span> <span class="str">one_for_one / one_for_all</span>
<span class="ok">✓</span> <span class="str">Crash detection + auto restart</span>
<span class="ok">✓</span> <span class="str">Let it crash philosophy</span>`,
    enter(t) {
      document.getElementById('statusPill').classList.remove('crash');
      document.getElementById('statusText').textContent = 'System Healthy';

      // Heavy business traffic
      if (Math.random() < 0.14) {
        sendBusinessMsg();
      }
      // Cross-cutting messages
      if (Math.random() < 0.04) {
        const all = actors.filter(a => a.alive && a.tier >= 1);
        if (all.length >= 2) {
          const a = all[Math.floor(Math.random() * all.length)];
          const b = all[Math.floor(Math.random() * all.length)];
          if (a !== b) sendMsg(actors.indexOf(a), actors.indexOf(b), a.color, 0.013);
        }
      }
    },
  },
];

// ═══════════════════════════════════════════
// Phase management
// ═══════════════════════════════════════════
function setPhase(idx) {
  if (idx === phase) return;
  phase = idx;
  phaseTime = 0;
  const p = phases[idx];
  const title = document.getElementById('phaseTitle');
  const code = document.getElementById('codeSnippet');

  title.classList.remove('visible');
  code.classList.remove('visible');

  setTimeout(() => {
    document.getElementById('phaseLabel').textContent = p.label;
    document.getElementById('phaseHeading').innerHTML = p.heading;
    document.getElementById('phaseSub').textContent = p.sub;
    code.innerHTML = p.code;
    title.classList.add('visible');
    code.classList.add('visible');
  }, 350);
}

// ═══════════════════════════════════════════
// Drawing
// ═══════════════════════════════════════════

function drawGrid() {
  const size = 64;
  ctx.strokeStyle = 'rgba(255,255,255,0.018)';
  ctx.lineWidth = 0.5;
  for (let x = size; x < W; x += size) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = size; y < H; y += size) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawAmbientGlows() {
  const g1 = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.min(W,H) * 0.45);
  g1.addColorStop(0, 'rgba(89,193,132,0.04)');
  g1.addColorStop(1, 'rgba(89,193,132,0)');
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, W, H);

  const g2 = ctx.createRadialGradient(W * 0.8, H * 0.15, 0, W * 0.8, H * 0.15, W * 0.25);
  g2.addColorStop(0, 'rgba(89,193,132,0.025)');
  g2.addColorStop(1, 'rgba(89,193,132,0)');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, W, H);
}

function drawAmbientParticles() {
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.green ? rgba(ACCENT, p.alpha) : rgba(WHITE, p.alpha * 0.6);
    ctx.fill();
  }
}

// ═══════════════════════════════════════════
// Draw supervision tree links — dashed, dimmer,
// visually distinct from messages. These are
// monitoring links, not communication channels.
// ═══════════════════════════════════════════
function drawEdges() {
  for (const e of edges) {
    if (e.opacity < 0.005) continue;
    const a = actors[e.from], b = actors[e.to];
    const ax = a.x, ay = a.y, bx = b.x, by = b.y;

    ctx.save();
    // Thin solid base line
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.strokeStyle = rgba(WHITE, e.opacity * 0.03);
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Dashed overlay — represents the supervision/monitor link
    ctx.setLineDash([2, 6]);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.strokeStyle = rgba(ACCENT, e.opacity * 0.06);
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Small diamond at midpoint to indicate "monitors" relationship
    if (e.opacity > 0.3) {
      const mx = (ax + bx) / 2, my = (ay + by) / 2;
      const ds = 3;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(mx, my - ds);
      ctx.lineTo(mx + ds, my);
      ctx.lineTo(mx, my + ds);
      ctx.lineTo(mx - ds, my);
      ctx.closePath();
      ctx.fillStyle = rgba(ACCENT, e.opacity * 0.15);
      ctx.fill();
    }

    ctx.restore();
  }
}

function drawActor(a) {
  if (a.scale < 0.005 && !a.alive) return;

  const spawnEase = easeOutElastic(a.spawnT);
  const s = a.alive ? spawnEase : a.scale;
  if (s < 0.005) return;

  const pulse = 1 + Math.sin(a.pulsePhase) * 0.04;
  const r = a.baseRadius * s * pulse;
  const x = a.x + (a.crashShake > 0.1 ? (Math.random()-0.5) * a.crashShake : 0);
  const y = a.y + (a.crashShake > 0.1 ? (Math.random()-0.5) * a.crashShake : 0);
  const alpha = a.opacity;

  // Respawn glow
  if (a.respawnGlow > 0.01) {
    const rr = r + 50 * (1 - a.respawnGlow);
    const g = ctx.createRadialGradient(x, y, r, x, y, rr);
    g.addColorStop(0, rgba(ACCENT, 0.25 * a.respawnGlow));
    g.addColorStop(1, 'rgba(89,193,132,0)');
    ctx.beginPath(); ctx.arc(x, y, rr, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
  }

  // Outer glow
  const glowR = r * 3;
  const gc = a.crash ? RED : a.color;
  const gg = ctx.createRadialGradient(x, y, r * 0.3, x, y, glowR);
  gg.addColorStop(0, rgba(gc, alpha * 0.1));
  gg.addColorStop(1, rgba(gc, 0));
  ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI * 2);
  ctx.fillStyle = gg; ctx.fill();

  // Rotating ring segments (only tier 0 & 1)
  if (a.tier <= 1 && alpha > 0.1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(a.ringPhase);
    const segCount = a.tier === 0 ? 6 : 4;
    const gap = 0.15;
    const segAngle = (Math.PI * 2) / segCount - gap;
    for (let i = 0; i < segCount; i++) {
      const startAngle = i * (segAngle + gap);
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.15, startAngle, startAngle + segAngle);
      ctx.strokeStyle = rgba(gc, alpha * 0.2);
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.restore();
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = rgba(gc, alpha * 0.3);
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Fill gradient
  ctx.beginPath();
  ctx.arc(x, y, r * 0.88, 0, Math.PI * 2);
  const fg = ctx.createRadialGradient(x, y - r * 0.3, 0, x, y, r);
  fg.addColorStop(0, rgba(gc, alpha * 0.18));
  fg.addColorStop(1, rgba(gc, alpha * 0.03));
  ctx.fillStyle = fg; ctx.fill();

  // Core — brighter center dot
  ctx.beginPath();
  ctx.arc(x, y, r * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = rgba(gc, alpha * 0.7);
  ctx.fill();

  // Inner glow bloom
  const cg = ctx.createRadialGradient(x, y, 0, x, y, r * 0.4);
  cg.addColorStop(0, rgba(gc, alpha * 0.25));
  cg.addColorStop(1, rgba(gc, 0));
  ctx.beginPath(); ctx.arc(x, y, r * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = cg; ctx.fill();

  // ─── Mailbox visualization ───
  // Show queued messages as small dots orbiting or stacked near the actor
  if (a.mailboxCount > 0 && alpha > 0.1) {
    const count = Math.min(a.mailboxCount, 6); // cap visual at 6
    const mbRadius = r * 1.35;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + time * 0.015;
      const mx = x + Math.cos(angle) * mbRadius;
      const my = y + Math.sin(angle) * mbRadius;
      // Tiny envelope-like dot
      ctx.beginPath();
      ctx.arc(mx, my, 2, 0, Math.PI * 2);
      ctx.fillStyle = rgba(ACCENT, alpha * 0.5 * Math.max(0.3, a.mailboxDecay));
      ctx.fill();
      // Glow
      const mg = ctx.createRadialGradient(mx, my, 0, mx, my, 5);
      mg.addColorStop(0, rgba(ACCENT, alpha * 0.15 * a.mailboxDecay));
      mg.addColorStop(1, rgba(ACCENT, 0));
      ctx.beginPath(); ctx.arc(mx, my, 5, 0, Math.PI * 2);
      ctx.fillStyle = mg; ctx.fill();
    }
  }

  // Mailbox flash (on receive)
  if (a.mailboxFlash > 0.05) {
    const mr = r * (1.6 + (1 - a.mailboxFlash) * 0.5);
    ctx.beginPath();
    ctx.arc(x, y, mr, 0, Math.PI * 2);
    ctx.strokeStyle = rgba(ACCENT, a.mailboxFlash * 0.4);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Label
  const fontSize = a.tier === 0 ? 11 : a.tier === 1 ? 10 : 9;
  ctx.font = `500 ${fontSize}px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = rgba(WHITE, alpha * (a.tier === 0 ? 0.6 : 0.4));
  ctx.fillText(a.label, x, y + r + 15);
}

function bezierPoint(ax, ay, cpx, cpy, bx, by, t) {
  const u = 1 - t;
  return {
    x: u*u*ax + 2*u*t*cpx + t*t*bx,
    y: u*u*ay + 2*u*t*cpy + t*t*by,
  };
}

function drawMessages() {
  for (const m of messages) {
    const p = bezierPoint(m.ax, m.ay, m.cpx, m.cpy, m.bx, m.by, m.progress);
    const alpha = Math.sin(m.progress * Math.PI);

    // Signal messages (:DOWN) get a distinctive look
    const dotSize = m.isSignal ? 3.5 : 2.5;
    const glowSize = m.isSignal ? 22 : 16;

    // Glow
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowSize);
    g.addColorStop(0, rgba(m.color, alpha * (m.isSignal ? 0.7 : 0.5)));
    g.addColorStop(1, rgba(m.color, 0));
    ctx.beginPath(); ctx.arc(p.x, p.y, glowSize, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();

    // Core dot
    ctx.beginPath();
    ctx.arc(p.x, p.y, dotSize, 0, Math.PI * 2);
    ctx.fillStyle = rgba(m.color, alpha * 0.95);
    ctx.fill();

    // Signal messages get a pulsing outer ring
    if (m.isSignal) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, dotSize + 4 + Math.sin(time * 0.1) * 2, 0, Math.PI * 2);
      ctx.strokeStyle = rgba(m.color, alpha * 0.4);
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Trail
    ctx.beginPath();
    let first = true;
    for (let i = 6; i >= 0; i--) {
      const tp = Math.max(0, m.progress - i * 0.015);
      const pt = bezierPoint(m.ax, m.ay, m.cpx, m.cpy, m.bx, m.by, tp);
      if (first) { ctx.moveTo(pt.x, pt.y); first = false; }
      else ctx.lineTo(pt.x, pt.y);
    }
    ctx.strokeStyle = rgba(m.color, alpha * 0.35);
    ctx.lineWidth = m.isSignal ? 2.5 : 2;
    if (m.isSignal) {
      ctx.save();
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.restore();
    } else {
      ctx.stroke();
    }
  }
}

function drawExplosions() {
  for (const p of explosions) {
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 2);
    g.addColorStop(0, rgba(p.color, p.life * 0.6));
    g.addColorStop(1, rgba(p.color, 0));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * (1 + (1-p.life) * 0.5), 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
  }
}

function drawShockwaves() {
  for (const s of shockwaves) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    ctx.strokeStyle = rgba(s.color || RED, s.opacity * 0.4);
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawRingPulses() {
  for (const r of ringPulses) {
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    ctx.strokeStyle = rgba(r.color, r.opacity * 0.5);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function drawVignette() {
  const g = ctx.createRadialGradient(CX, H * 0.35, Math.min(W,H) * 0.25, CX, H * 0.35, Math.max(W,H) * 0.8);
  g.addColorStop(0, 'rgba(10,10,10,0)');
  g.addColorStop(1, 'rgba(10,10,10,0.5)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawAccentLines() {
  const tg = ctx.createLinearGradient(W * 0.2, 0, W * 0.8, 0);
  tg.addColorStop(0, 'rgba(89,193,132,0)');
  tg.addColorStop(0.5, 'rgba(89,193,132,0.2)');
  tg.addColorStop(1, 'rgba(89,193,132,0)');
  ctx.fillStyle = tg;
  ctx.fillRect(W * 0.2, 0, W * 0.6, 1);

  const bg = ctx.createLinearGradient(W * 0.2, 0, W * 0.8, 0);
  bg.addColorStop(0, 'rgba(89,193,132,0)');
  bg.addColorStop(0.5, 'rgba(89,193,132,0.1)');
  bg.addColorStop(1, 'rgba(89,193,132,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(W * 0.2, H - 1, W * 0.6, 1);
}

// ═══════════════════════════════════════════
// Update
// ═══════════════════════════════════════════
function update() {
  time++;
  const dt = 1 / 60;

  // Phase
  if (phase >= 0 && phase < phases.length) {
    phaseTime += dt;
    phases[phase].enter(phaseTime);
    if (phaseTime >= phases[phase].duration) {
      const next = (phase + 1) % phases.length;
      if (next === 0) {
        initActors();
        document.getElementById('statusPill').classList.remove('crash');
        document.getElementById('statusText').textContent = 'System Healthy';
      }
      setPhase(next);
    }
  }

  // Actors
  let alive = 0;
  for (const a of actors) {
    a.scale += (a.targetScale - a.scale) * 0.06;
    a.opacity += ((a.alive ? 1 : 0) - a.opacity) * 0.05;
    a.pulsePhase += 0.025;
    a.ringPhase += a.tier === 0 ? 0.008 : 0.005;
    a.x = a.baseX + Math.sin(time * 0.004 + a.floatSeedX) * 4;
    a.y = a.baseY + Math.cos(time * 0.003 + a.floatSeedY) * 3;
    if (a.crash && a.alive) a.crashShake = Math.min(8, a.crashShake + 0.4);
    else a.crashShake *= 0.92;
    a.respawnGlow *= 0.975;
    a.mailboxFlash *= 0.93;
    // Mailbox processing: gradually drain queued messages
    if (a.mailboxCount > 0 && a.alive) {
      a.processTimer += dt;
      if (a.processTimer > 0.3) { // process one message every 0.3s
        a.mailboxCount = Math.max(0, a.mailboxCount - 1);
        a.processTimer = 0;
      }
    }
    a.mailboxDecay = a.mailboxCount > 0 ? Math.min(1, a.mailboxDecay + 0.05) : Math.max(0, a.mailboxDecay - 0.02);
    if (a.alive) alive++;
  }
  document.getElementById('procCount').textContent = alive;

  // Messages
  for (let i = messages.length - 1; i >= 0; i--) {
    messages[i].progress += messages[i].speed;
    if (messages[i].progress >= 1) {
      const dest = actors[messages[i].toIdx];
      if (dest && dest.alive) {
        dest.mailboxFlash = 1;
        dest.mailboxCount = Math.min(6, dest.mailboxCount + 1);
      }
      messages.splice(i, 1);
    }
  }

  // Explosions
  for (let i = explosions.length - 1; i >= 0; i--) {
    const p = explosions[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.vy += 0.02;
    p.life -= p.decay;
    if (p.life <= 0) explosions.splice(i, 1);
  }

  // Shockwaves
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.radius += 3;
    s.opacity *= 0.96;
    if (s.opacity < 0.01) shockwaves.splice(i, 1);
  }

  // Ring pulses
  for (let i = ringPulses.length - 1; i >= 0; i--) {
    const r = ringPulses[i];
    r.radius += 1.5;
    r.opacity *= 0.96;
    if (r.opacity < 0.01) ringPulses.splice(i, 1);
  }

  // Screen shake
  if (screenShake.intensity > 0.1) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.intensity *= 0.9;
  } else {
    screenShake.x = 0; screenShake.y = 0;
  }
}

// ═══════════════════════════════════════════
// Render
// ═══════════════════════════════════════════
function render() {
  ctx.save();
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);

  ctx.translate(screenShake.x, screenShake.y);

  drawGrid();
  drawAmbientGlows();
  drawAmbientParticles();
  drawAccentLines();
  drawEdges();
  drawRingPulses();
  drawMessages();
  drawExplosions();
  drawShockwaves();

  // Actors — back-to-front
  const sorted = actors.map((a,i) => ({a, i})).sort((a,b) => b.a.tier - a.a.tier);
  for (const {a} of sorted) drawActor(a);

  drawVignette();

  ctx.restore();
}

// ═══════════════════════════════════════════
// Main loop
// ═══════════════════════════════════════════
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
initActors();
resize();

setTimeout(() => document.getElementById('logo').classList.add('visible'), 200);
setTimeout(() => document.getElementById('statusPill').classList.add('visible'), 500);
setTimeout(() => document.getElementById('processCounter').classList.add('visible'), 700);
setTimeout(() => setPhase(0), 900);

loop();
</script>
</body>

services:
  landing:
    build: ./landing
    restart: unless-stopped
    expose:
      - "3000"

  app:
    build: ./frontend-exp
    restart: unless-stopped
    expose:
      - "3000"

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - landing
      - app
    ports:
      - "80:80"
      - "3000:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
